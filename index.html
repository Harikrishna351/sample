<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ BOREDOM DESTROYER ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            cursor: crosshair;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: #00ff88;
            font-size: 14px;
            text-shadow: 0 0 10px #00ff88;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        .chaos-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: transparent;
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .chaos-btn:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.8);
            transform: translateX(-50%) scale(1.1);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .mode-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #00ffff;
            font-size: 12px;
            z-index: 10;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h2>⚡ PARTICLE CHAOS ENGINE ⚡</h2>
        <p>Move mouse to attract</p>
        <p>Click to explode</p>
        <p>Spacebar = Color Shift</p>
        <p>Double click = Clear</p>
    </div>

    <div class="mode-indicator" id="mode">MODE: NEON DREAM</div>

    <button class="chaos-btn" onclick="triggerMegaChaos()">INITIATE MEGA CHAOS</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let hue = 0;
        let mode = 0;
        const modes = ['NEON DREAM', 'BLOOD VOID', 'CYBER ICE', 'GOLD RUSH', 'ACID TRIP'];
        const colors = [
            ['#ff00ff', '#00ffff', '#ffff00'],
            ['#ff0000', '#8b0000', '#ff4500'],
            ['#00ffff', '#0080ff', '#ffffff'],
            ['#ffd700', '#ffaa00', '#ffff00'],
            ['#ff00ff', '#00ff00', '#ff0000', '#ffff00', '#00ffff']
        ];

        class Particle {
            constructor(x, y, type = 'normal') {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.color = colors[mode][Math.floor(Math.random() * colors[mode].length)];
                this.life = 100;
                this.decay = Math.random() * 0.5 + 0.5;
                this.type = type;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.spin;

                // Mouse attraction
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 200 && !this.type === 'chaos') {
                    this.speedX += dx * 0.001;
                    this.speedY += dy * 0.001;
                }

                // Gravity/friction
                this.speedX *= 0.98;
                this.speedY *= 0.98;
                this.life -= this.decay;

                if (this.size > 0.2) this.size -= 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 100;

                if (mode === 4) { // Acid trip - squares
                    ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                } else if (mode === 1) { // Blood - circles with trails
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Neon circles
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        const mouse = { x: undefined, y: undefined };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;

            // Spawn trail particles
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(e.x, e.y));
            }
        });

        window.addEventListener('click', (e) => {
            // Explosion
            for (let i = 0; i < 30; i++) {
                const p = new Particle(e.x, e.y);
                p.speedX *= 3;
                p.speedY *= 3;
                particles.push(p);
            }
        });

        window.addEventListener('dblclick', () => {
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                mode = (mode + 1) % modes.length;
                document.getElementById('mode').textContent = `MODE: ${modes[mode]}`;

                // Flash effect
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function triggerMegaChaos() {
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    for (let j = 0; j < 20; j++) {
                        particles.push(new Particle(x, y, 'chaos'));
                    }
                }, i * 50);
            }
        }

        // Auto-generate some ambient particles
        setInterval(() => {
            if (particles.length < 50) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }
        }, 100);

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0 || particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                }
            }

            // Connect nearby particles with lines (constellation effect)
            if (mode === 0 || mode === 2) {
                ctx.strokeStyle = colors[mode][0];
                ctx.lineWidth = 0.5;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 100) {
                            ctx.beginPath();
                            ctx.globalAlpha = (100 - distance) / 1000;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
